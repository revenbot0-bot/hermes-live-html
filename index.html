<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Page removed</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #07111f; color: #eef6ff; }
    main { width: min(680px, calc(100% - 32px)); padding: 32px; border: 1px solid rgba(238,246,255,.18); border-radius: 24px; background: rgba(255,255,255,.04); box-shadow: 0 24px 80px rgba(0,0,0,.35); }
    h1 { margin: 0 0 12px; font-size: clamp(2rem, 6vw, 4rem); letter-spacing: -.05em; line-height: .95; }
    p { color: #a9bed3; font-size: 1.08rem; line-height: 1.6; margin: 0; }
  </style>
</head>
<body>
  <main aria-labelledby="page-title">
    <h1 id="page-title">Page removed</h1>
    <p>This published content has been removed by request.</p>
  </main>
</body>
</html>
